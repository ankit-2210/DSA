name: Organize LeetCode

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  organize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Organize Problems
        run: |
          mkdir -p Easy Medium Hard

          for dir in */ ; do

            # Check only numbered LeetCode folders
            if [[ "$dir" =~ ^[0-9]+ ]]; then

              target=""

              # Detect difficulty from README.md
              if grep -qi "easy" "$dir/README.md" 2>/dev/null; then
                target="Easy"
              elif grep -qi "medium" "$dir/README.md" 2>/dev/null; then
                target="Medium"
              elif grep -qi "hard" "$dir/README.md" 2>/dev/null; then
                target="Hard"
              fi

              # Move + merge files safely
              if [ -n "$target" ]; then

                mkdir -p "$target/$dir"

                # Merge contents instead of failing
                rsync -a "$dir" "$target/"

                # Remove old folder after merge
                rm -rf "$dir"
              fi
            fi
          done

      - name: Commit Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .

          git commit -m "Auto organize LeetCode problems" || echo "No changes"

          git push
