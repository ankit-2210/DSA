name: Organize LeetCode

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: organize-leetcode
  cancel-in-progress: true

jobs:
  organize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Organize Problems
        shell: bash
        run: |
          set -e

          mkdir -p Easy Medium Hard

          echo "Scanning repository..."

          # find all folders that contain README.md
          find . -type f -name "README.md" | while read -r readme; do

            folder=$(dirname "$readme")
            folder="${folder#./}"
            folder_name=$(basename "$folder")

            # skip system folders
            case "$folder" in
              .github|Easy|Medium|Hard|*/Easy/*|*/Medium/*|*/Hard/*)
                continue
                ;;
            esac

            # only process valid problem folders (start with number or digit prefix)
            if [[ ! "$folder_name" =~ ^[0-9] ]]; then
              continue
            fi

            echo "--------------------------------------"
            echo "Processing: $folder"

            # extract difficulty
            difficulty=$(grep -iE 'easy|medium|hard' "$readme" \
              | head -n 1 \
              | grep -ioE 'easy|medium|hard' \
              | tr '[:upper:]' '[:lower:]')

            if [ -z "$difficulty" ]; then
              echo "Skipping $folder (difficulty not found)"
              continue
            fi

            target=$(echo "$difficulty" | awk '{print toupper(substr($0,1,1)) substr($0,2)}')

            dest="$target/$folder_name"

            echo "Detected: $difficulty"
            echo "Moving -> $dest"

            mkdir -p "$target"

            if [ -d "$dest" ]; then
              echo "Already exists: $dest"
              continue
            fi

            # try git mv first, fallback to mv
            git mv "$folder" "$target/" 2>/dev/null || mv "$folder" "$target/"

          done

      - name: Commit and Push Changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto organize LeetCode problems"

          git pull --rebase origin main || true
          git push origin main
