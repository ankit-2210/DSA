name: Organize LeetCode

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  organize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Organize Problems
        run: |
          mkdir -p Easy Medium Hard

          for dir in */ ; do

            # Remove trailing slash
            folder="${dir%/}"

            # Check only numbered LeetCode folders
            if [[ "$folder" =~ ^[0-9]+ ]]; then

              target=""

              # Detect difficulty from README.md
              if grep -qi "easy" "$folder/README.md" 2>/dev/null; then
                target="Easy"
              elif grep -qi "medium" "$folder/README.md" 2>/dev/null; then
                target="Medium"
              elif grep -qi "hard" "$folder/README.md" 2>/dev/null; then
                target="Hard"
              fi

              if [ -n "$target" ]; then

                # Create target folder
                mkdir -p "$target/$folder"

                # Copy files INSIDE the folder
                rsync -a "$folder"/ "$target/$folder"/

                # Delete original folder
                rm -rf "$folder"
              fi
            fi
          done

      - name: Commit Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .

          git commit -m "Auto organize LeetCode problems" || echo "No changes"

          git push
