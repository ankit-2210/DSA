name: Organize LeetCode

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  organize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Organize Problems
        run: |
          mkdir -p Easy Medium Hard

          find . -maxdepth 1 -type d | while read dir; do

            folder=$(basename "$dir")

            # Skip unwanted folders
            if [[ "$folder" == "." || \
                  "$folder" == ".git" || \
                  "$folder" == "Easy" || \
                  "$folder" == "Medium" || \
                  "$folder" == "Hard" ]]; then
              continue
            fi

            # Process only numbered LeetCode folders
            if [[ "$folder" =~ ^[0-9]+ ]]; then

              target=""

              # Detect difficulty from README.md
              if grep -qi "easy" "$folder/README.md" 2>/dev/null; then
                target="Easy"
              elif grep -qi "medium" "$folder/README.md" 2>/dev/null; then
                target="Medium"
              elif grep -qi "hard" "$folder/README.md" 2>/dev/null; then
                target="Hard"
              fi

              if [ -n "$target" ]; then

                echo "Moving $folder -> $target"

                mkdir -p "$target/$folder"

                # Copy folder contents
                rsync -a "$folder"/ "$target/$folder"/

                # Remove original folder
                rm -rf "$folder"
              fi
            fi
          done

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "Auto organize LeetCode problems"

          # Pull latest changes to avoid push conflicts
          git pull --rebase origin main

          git push origin main
