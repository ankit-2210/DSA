name: Organize LeetCode

on:
  push:
    branches:
      - main

concurrency:
  group: organize-leetcode
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  organize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Organize Problems
        shell: bash
        run: |
          mkdir -p Easy Medium Hard

          find . -maxdepth 1 -mindepth 1 -type d | while read dir; do

            folder=$(basename "$dir")

            # Skip special folders
            case "$folder" in
              .git|.github|Easy|Medium|Hard)
                continue
                ;;
            esac

            # Only process folders starting with digits
            if [[ ! "$folder" =~ ^[0-9]+ ]]; then
              continue
            fi

            echo "Checking: $folder"

            readme="$folder/README.md"

            if [ ! -f "$readme" ]; then
              echo "README.md not found for $folder"
              continue
            fi

            difficulty=$(grep -ioE 'easy|medium|hard' "$readme" | head -n 1 | tr '[:upper:]' '[:lower:]')

            target=""
            case "$difficulty" in
              easy)
                target="Easy"
                ;;
              medium)
                target="Medium"
                ;;
              hard)
                target="Hard"
                ;;
            esac

            if [ -z "$target" ]; then
              echo "Could not determine difficulty for $folder"
              continue
            fi

            echo "Moving $folder -> $target"

            mkdir -p "$target"

            if [ -d "$target/$folder" ]; then
              echo "$target/$folder already exists"
              continue
            fi

            git mv "$folder" "$target/"
          done

      - name: Commit and Push Changes
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto organize LeetCode problems"

          for i in 1 2 3; do
            echo "Push attempt $i"

            git pull --rebase origin main || true

            if git push origin HEAD:main; then
              echo "Push successful"
              exit 0
            fi

            echo "Push failed. Retrying in 5 seconds..."
            sleep 5
          done

          echo "Push failed after 3 attempts"
          exit 1
