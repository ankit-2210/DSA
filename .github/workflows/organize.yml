name: Organize LeetCode

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: organize-leetcode
  cancel-in-progress: true

jobs:
  organize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Organize Problems
        run: |
          set -e

          mkdir -p Easy Medium Hard

          find . \
            -path "./Easy" -prune -o \
            -path "./Medium" -prune -o \
            -path "./Hard" -prune -o \
            -path "./.git" -prune -o \
            -path "./.github" -prune -o \
            -type f -name "README.md" -print | while read -r readme
          do

            folder=$(dirname "$readme")
            folder="${folder#./}"
            folder_name=$(basename "$folder")

            # Process only LeetCode problem folders
            if [[ ! "$folder_name" =~ ^[0-9] ]]; then
              continue
            fi

            difficulty=$(grep -iE 'easy|medium|hard' "$readme" \
              | head -n 1 \
              | grep -ioE 'easy|medium|hard' \
              | tr '[:upper:]' '[:lower:]')

            if [ -z "$difficulty" ]; then
              echo "Difficulty not found for $folder"
              continue
            fi

            case "$difficulty" in
              easy) target="Easy" ;;
              medium) target="Medium" ;;
              hard) target="Hard" ;;
              *) continue ;;
            esac

            dest="$target/$folder_name"

            if [ -d "$dest" ]; then
              echo "Already exists: $dest"
              continue
            fi

            echo "Moving $folder -> $dest"
            git mv "$folder" "$dest" 2>/dev/null || mv "$folder" "$dest"

          done

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto organize LeetCode problems"
          git push
