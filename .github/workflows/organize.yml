name: Organize LeetCode

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  organize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Organize Problems
        run: |
          set -e

          mkdir -p Easy Medium Hard

          find . -maxdepth 1 -type d | while read dir
          do
            folder=$(basename "$dir")

            # Skip non-problem folders
            case "$folder" in
              "."|".git"|".github"|"Easy"|"Medium"|"Hard")
                continue
                ;;
            esac

            # Process only LeetCode problem folders
            if [[ ! "$folder" =~ ^[0-9]+- ]]; then
              continue
            fi

            readme="$dir/README.md"

            if [ ! -f "$readme" ]; then
              echo "README not found: $folder"
              continue
            fi

            echo "Processing: $folder"

            difficulty=$(grep -oE 'Difficulty-(Easy|Medium|Hard)' "$readme" | head -1 | cut -d'-' -f2)

            if [ -z "$difficulty" ]; then
              echo "Could not determine difficulty for $folder"
              continue
            fi

            target="$difficulty"

            if [ -d "$target/$folder" ]; then
              echo "Merging into existing folder: $target/$folder"

              cp -rn "$folder/"* "$target/$folder/" 2>/dev/null || true

              rm -rf "$folder"

              continue
            fi

            echo "Moving $folder -> $target/$folder"
            git mv "$folder" "$target/$folder"
          done

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto organize LeetCode problems"
          git push
