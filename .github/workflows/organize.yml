name: Organize LeetCode

on:
  push:
    branches:
      - main

concurrency:
  group: organize-leetcode
  cancel-in-progress: true
  
permissions:
  contents: write

jobs:
  organize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Organize Problems
        run: |
          mkdir -p Easy Medium Hard

          find . -maxdepth 1 -type d | while read dir; do

            folder=$(basename "$dir")

            # Skip system/category folders
            if [[ "$folder" == "." || \
                  "$folder" == ".git" || \
                  "$folder" == ".github" || \
                  "$folder" == "Easy" || \
                  "$folder" == "Medium" || \
                  "$folder" == "Hard" ]]; then
              continue
            fi

            # Process only numbered LeetCode folders
            if [[ "$folder" =~ ^[0-9]+ ]]; then

              target=""

              # Detect difficulty from README.md
              if grep -qi "easy" "$folder/README.md" 2>/dev/null; then
                target="Easy"
              elif grep -qi "medium" "$folder/README.md" 2>/dev/null; then
                target="Medium"
              elif grep -qi "hard" "$folder/README.md" 2>/dev/null; then
                target="Hard"
              fi

              if [ -n "$target" ]; then
              
                # Skip if already exists
                if [ -d "$target/$folder" ]; then
                  echo "$target/$folder already exists"
                  continue
                fi

                echo "Moving $folder -> $target"

                mkdir -p "$target/$folder"

                # Copy folder contents
                rsync -a "$folder"/ "$target/$folder"/

                # Remove original folder
                rm -rf "$folder"
              fi
            fi
          done

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto organize LeetCode problems"

          # Retry push up to 3 times
          for i in 1 2 3; do
            echo "Attempt $i"

            git pull --rebase origin main || true

            if git push origin HEAD:main; then
              echo "Push successful"
              exit 0
            fi

            echo "Push failed, retrying in 5 seconds..."
            sleep 5
          done

          echo "Push failed after 3 attempts"
          exit 1
